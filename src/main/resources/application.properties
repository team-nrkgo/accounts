spring.application.name=accounts

app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.backend.url=${BACKEND_URL:http://localhost:8080}
app.cookie.domain=${COOKIE_DOMAIN:}

# Super Admin Emails (Product Owners)
# Comma-separated list of emails that have access to all /admin/ endpoints.
# These are product-level owners, NOT org admins.
app.admin.emails=${ADMIN_EMAILS:team.nrkgo@gmail.com,nrk.karthicknrk@gmail.com}
app.admin.restricted-tables=${ADMIN_RESTRICTED_TABLES:user_sessions,user_external_creds,external_accounts}





# Database Configuration (MySQL)
# 1. I added 'allowPublicKeyRetrieval=true' which is often required for local MySQL 8.0+
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/accounts?allowPublicKeyRetrieval=true&useSSL=false}

spring.datasource.username=${DB_USER:debian-sys-maint}

# 2. IMPORTANT: Replace 'YOUR_NEW_PASSWORD' below with the actual password you just set in the terminal
spring.datasource.password=${DB_PASSWORD:}


spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. (Optional) This automatically creates tables for you
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Connection Pool (HikariCP) - Production Ready Settings
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG
logging.level.com.nrkgo.accounts=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JSON Configuration
# Enforce snake_case for all JSON properties (e.g. firstName -> first_name)
spring.jackson.property-naming-strategy=SNAKE_CASE

# Mail Configuration (Google SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=team.nrkgo@gmail.com
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.connectiontimeout=5000
spring.mail.properties.mail.timeout=3000
spring.mail.properties.mail.writetimeout=5000

# Guides Configuration
app.guides.default-limit=30

# Slack Notification Configuration
app.slack.enabled=${SLACK_ENABLED:false}
app.slack.bot-token=${SLACK_BOT_TOKEN:}
app.slack.channel.errors=${SLACK_CHANNEL_ERRORS:C04TF9BDQ2H}
app.slack.channel.alerts=${SLACK_CHANNEL_ALERTS:C04TF9BDQ2H}

# Google Gemini API
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models
gemini.default.model=gemini-2.5-flash
 